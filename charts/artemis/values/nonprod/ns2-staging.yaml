environment: staging

broker:
  replicas:
    live: 1
    backup: 1
  ha:
    enabled: true
    replication: synchronous
    quorumSize: 1
  clustered: false
  resources:
    requests:
      cpu: "1"
      memory: "3Gi"              # Increased — should be >= xms + overhead for connection testing
    limits:
      cpu: "2"
      memory: "6Gi"              # JVM 3g + metaspace + native memory (~2x heap)
  storage:
    size: 50Gi
    provisionedIops: "6000"        # Load testing needs headroom above gp3 baseline 3K
    provisionedThroughput: "250"
  jvm:
    xmx: "3g"                      # Increased — headroom for connection testing
    xms: "1g"
  journal:
    syncNonTransactional: true

console:
  ingress:
    enabled: true
    host: artemis-ns2.internal.yourdomain.com
    certificateArn: arn:aws:acm:us-east-2:NONPROD_ACCOUNT:certificate/XXXX

networkPolicy:
  enabled: true

podDisruptionBudget:
  enabled: true

monitoring:
  serviceMonitor:
    enabled: true
    interval: 15s

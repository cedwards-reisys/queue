apiVersion: v1
kind: Service
metadata:
  name: {{ include "artemis.fullname" . }}-live
  labels:
    {{- include "artemis.labels" . | nindent 4 }}
    role: live
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  type: ClusterIP
  selector:
    {{- include "artemis.selectorLabels" . | nindent 4 }}
    role: live
  ports:
    - name: openwire
      port: {{ .Values.ports.openwire }}
      targetPort: openwire
      protocol: TCP

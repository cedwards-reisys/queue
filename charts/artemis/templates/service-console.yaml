{{- if .Values.console.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "artemis.fullname" . }}-console
  labels:
    {{- include "artemis.labels" . | nindent 4 }}
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  type: ClusterIP
  selector:
    {{- include "artemis.selectorLabels" . | nindent 4 }}
    role: live
  ports:
    - name: console
      port: {{ .Values.console.service.port }}
      targetPort: console
      protocol: TCP
{{- end }}

# Default values — single broker, no HA, minimal resources (safe base for dev)

environment: dev

broker:
  image:
    repository: apache/activemq-artemis
    tag: "2.53.0"
    pullPolicy: IfNotPresent
  replicas:
    live: 1
    backup: 0
  ha:
    enabled: false
    replication: synchronous
    quorumSize: 1
    checkForLiveServer: true
    voteOnReplicationFailure: true
  clustered: false
  nodeSelector:
    kubernetes.io/arch: amd64

  # Pod security context - runs as non-root UID 1000 (artemis user in official image)
  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 1000
    runAsGroup: 1000
    fsGroup: 1000
    seccompProfile:
      type: RuntimeDefault

  # Container security context
  containerSecurityContext:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: false  # Artemis needs writable /tmp, /var/lib/artemis/tmp
    runAsNonRoot: true
    runAsUser: 1000
    capabilities:
      drop:
        - ALL

  # Init container security (tls-init) - must write to emptyDir
  initContainerSecurityContext:
    runAsNonRoot: true
    runAsUser: 1000
    runAsGroup: 1000
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: true
    capabilities:
      drop:
        - ALL

  # Init container resources
  initContainerResources:
    requests:
      cpu: "100m"
      memory: "128Mi"
    limits:
      cpu: "200m"
      memory: "256Mi"

  resources:
    requests:
      cpu: "500m"
      memory: "1Gi"
    limits:
      cpu: "1"
      memory: "2Gi"
  storage:
    size: 20Gi
    storageClass: artemis-gp3-encrypted
    createStorageClass: false      # Set true if artemis-gp3-encrypted doesn't exist yet
    kmsKeyId: ""                   # CMK ARN for EBS encryption. Empty = AWS-managed key
    provisionedIops: ""            # gp3 provisioned IOPS (3000-16000). Empty = baseline 3000
    provisionedThroughput: ""      # gp3 provisioned throughput MB/s (125-1000). Empty = baseline 125
  jvm:
    xmx: "1g"
    xms: "512m"
    gc: "-XX:+UseZGC"
    extraOpts: ""
  # --- Journal (disk I/O performance) ---
  journal:
    type: ASYNCIO                 # ASYNCIO (libaio) on x86/amd64 for direct I/O — bypasses page cache
    bufferSize: 501760            # ~490KB default. Increase to 1-2MB for burst throughput
    minFiles: 2                   # Pre-allocated journal files. Increase to 10-20 for prod
    poolFiles: -1                 # Reuse pool. Set 20-50 for prod to avoid file create/delete churn
    syncTransactional: true       # fsync on transactional writes. Always true for durability
    syncNonTransactional: false   # fsync on all writes. Set true for zero-loss prod
    fileSize: 10485760            # 10MB per journal file. Increase for high-throughput (max 2GB)
    compactMinFiles: 10           # Trigger compaction when this many files exist
    compactPercentage: 30         # Compact when live data < 30% of journal size
    maxIo: 500                    # Max concurrent IO. ASYNCIO=500, NIO=1

  # --- Large Messages ---
  largeMessages:
    minSize: 102400               # 100KB — messages above this stream to disk, bypass heap

  # --- Memory / Paging ---
  paging:
    globalMaxSize: -1             # -1 = 50% of JVM heap. Set explicit bytes for fine control
    maxDiskUsage: 90              # Percent — broker blocks producers at this disk usage
    pageSyncTimeout: 3360000      # Nanoseconds — sync timeout for page writes
    pageMaxCacheSize: 5           # Number of page files cached in memory per address

  # --- Thread Pools ---
  threads:
    threadPoolMaxSize: 30         # General thread pool. -1 = unbounded. 30 = good default
    scheduledThreadPoolMaxSize: 5 # Scheduled tasks (expiry scans, redelivery). 5 = default

  # --- Addressing / Queue Behavior ---
  addressing:
    addressFullPolicy: BLOCK      # BLOCK | PAGE | DROP | FAIL. BLOCK = back-pressure producers
    maxSizeBytes: -1              # Per-address max. -1 = use globalMaxSize. Set per-queue overrides below
    maxDeliveryAttempts: 10       # Attempts before DLQ
    redeliveryDelay: 5000         # ms — initial delay before redelivery
    maxRedeliveryDelay: 30000     # ms — cap on exponential backoff
    redeliveryMultiplier: 2.0     # Exponential backoff multiplier
    expiryDelay: -1               # ms — override message TTL. -1 = use message expiry
    autoCreateDlq: true
    dlqPrefix: "DLQ."
    dlqSuffix: ""
    expiryAddress: ExpiryQueue
    autoCreateQueues: true
    autoCreateAddresses: true
    defaultQueueRoutingType: ANYCAST
    # Slow consumer detection
    slowConsumerThreshold: -1     # msgs/sec. -1 = disabled. Set to detect stuck consumers
    slowConsumerPolicy: NOTIFY    # NOTIFY | KILL. NOTIFY = log, KILL = disconnect
    slowConsumerCheckPeriod: 30   # seconds between slow consumer checks

  # --- Address Setting Overrides ---
  # Apply different policies to specific queue patterns
  # Example: documents.# gets lower retry count, orders.# gets higher max size
  addressSettingOverrides: []
  # - match: "documents.#"
  #   maxDeliveryAttempts: 5
  #   maxSizeBytes: 524288000     # 500MB
  # - match: "orders.#"
  #   maxDeliveryAttempts: 15
  #   redeliveryDelay: 10000
  #   slowConsumerThreshold: 5

  # --- TLS ---
  tls:
    enabled: false                # Enable for PII environments
    # cert-manager or externally provisioned certs
    certSecret: ""                # K8s TLS Secret name containing tls.crt, tls.key, ca.crt
    # For PII workloads, enable mTLS on openwire acceptor
    requireClientAuth: false      # Set true to enforce mTLS for all client connections
    # If using cert-manager, set these to auto-create the cert
    certManager:
      enabled: false
      issuerRef:
        name: ""                  # e.g. letsencrypt-prod or internal-ca
        kind: ClusterIssuer
      duration: 8760h             # 1 year
      renewBefore: 720h           # 30 days before expiry

  # --- NLB (EC2 client access) ---
  nlb:
    enabled: false                  # Enable for EC2 clients outside EKS
    groupName: ""                   # NLB ingress group (e.g. "artemis-nlb")
    annotations: {}                 # Extra LB annotations (cross-zone, idle timeout, etc.)

  # --- Connection Management ---
  connections:
    maxConnections: 1000          # Per acceptor — size for 2x peak during rolling deploys
    ttlOverride: 300000           # 5min — broker closes stale connections (ASG terminations)
    ttlCheckInterval: 30000       # 30s — how often broker scans for dead connections
    tcpSendBufferSize: 1048576    # 1MB
    tcpReceiveBufferSize: 1048576 # 1MB
    enabledProtocols: "OPENWIRE,CORE,AMQP"

  # --- Cluster ---
  cluster:
    redistributionDelay: 0        # ms — 0 = immediate redistribution to brokers with consumers
    forwardWhenNoConsumers: true   # Forward messages even if remote broker has no consumers
    messageLoadBalancing: ON_DEMAND  # ON_DEMAND | STRICT | OFF
    maxHops: 1                    # Max cluster hops for message redistribution
    callTimeout: 30000            # ms — timeout for cluster operations
    retryInterval: 500            # ms — retry interval for cluster connection failures

  # --- Graceful Shutdown ---
  gracefulShutdown:
    enabled: true
    timeout: 60000                # ms — wait for in-flight messages before forced shutdown

  # --- Background Tasks ---
  backgroundTasks:
    messageExpiryScanPeriod: 30000   # ms — how often broker scans for expired messages
    addressQueueScanPeriod: 30000    # ms — how often broker scans for auto-delete eligible queues
  auth:
    adminUser: admin
    # adminPassword sourced from secret
    existingSecret: ""              # Use pre-existing K8s Secret (bypasses all secret generation)
    users: {}
    # users:
    #   producer-app: { password: "", roles: ["producers"] }
    #   consumer-app: { password: "", roles: ["consumers"] }

  # --- External Secrets Operator ---
  externalSecrets:
    enabled: false                  # Enable to pull secrets from SSM Parameter Store or Vault
    refreshInterval: 1h             # How often ESO syncs from the backend
    secretStoreRef:
      name: ""                      # Name of SecretStore or ClusterSecretStore
      kind: ClusterSecretStore      # SecretStore | ClusterSecretStore
    # Backend-specific key paths
    remoteRefs:
      adminPassword: ""             # e.g. /artemis/prod/admin-password (SSM) or secret/artemis/admin-password (Vault)
      tlsKeystorePassword: ""       # e.g. /artemis/prod/tls-keystore-password
      tlsTruststorePassword: ""     # e.g. /artemis/prod/tls-truststore-password

console:
  enabled: true
  service:
    port: 8161
  ingress:
    enabled: false
    host: ""
    ingressGroup: shared-ingress
    ingressClassName: alb
    scheme: internal
    certificateArn: ""
    healthCheckPath: /console/login

networkPolicy:
  enabled: false
  allowedClientLabels:
    artemis-client: "true"
  prometheusNamespace: monitoring
  # Console access control - restrict by namespace/pod labels
  # CRITICAL: For PII workloads, restrict console access
  allowConsoleFrom:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: operations
      podSelector:
        matchLabels:
          app: bastion
  # Default-deny egress - allow only cluster DNS and inter-broker
  enableEgressPolicy: true

monitoring:
  jmxExporter:
    enabled: true
    image:
      repository: bitnami/jmx-exporter
      tag: "1.0.1"  # FIXED: pinned from 'latest'
      pullPolicy: IfNotPresent
    port: 9404
    # Security context for sidecar
    securityContext:
      runAsNonRoot: true
      runAsUser: 1000
      allowPrivilegeEscalation: false
      readOnlyRootFilesystem: true
      capabilities:
        drop:
          - ALL
    resources:
      requests:
        cpu: "100m"
        memory: "128Mi"
      limits:
        cpu: "200m"
        memory: "256Mi"
  serviceMonitor:
    enabled: false
    interval: 15s
    labels: {}
  grafanaDashboard:
    enabled: false
    labels: {}                    # e.g. { grafana_dashboard: "1" } if your sidecar uses custom labels
    annotations: {}               # e.g. { grafana_folder: "Messaging" }

podDisruptionBudget:
  enabled: false
  minAvailable: 1

serviceAccount:
  create: true
  name: artemis
  annotations: {}

ports:
  openwire: 61616
  cluster: 61617
  replication: 61618
  console: 8161
  metrics: 9404
